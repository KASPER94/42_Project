[build]
target = "i386-kfs.json"

# Recompile `core` and `compiler_builtins` for our bare-metal target.
# `compiler-builtins-mem` provides memcpy/memset/memmove/memcmp.
[unstable]
build-std = ["core", "compiler_builtins"]
build-std-features = ["compiler-builtins-mem"]
# Newer nightly gates custom .json target specs behind this flag.
json-target-spec = true
