# /etc/vconsole.conf — virtual console keymap + font (LFS Ch.9, systemd variant).
#
# Read by systemd-vconsole-setup.service at boot to configure the text console.
# KEYMAP selects the kbd keymap (installed by the Kbd package); FONT selects a
# console font shipped with Kbd. `us` is the default US QWERTY layout; the
# Lat2-Terminus16 font covers Latin scripts at a readable size in a VM console.
KEYMAP=us
FONT=Lat2-Terminus16
