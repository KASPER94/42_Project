# /etc/locale.conf — system-wide locale (LFS Ch.9, systemd variant).
#
# Read by systemd at boot and exported to every service/login session. We use a
# UTF-8 English locale; the glibc locale `en_US.UTF-8` must have been generated
# (localedef) during the Glibc final-system step. LANG alone is sufficient for a
# base system; LC_ALL is intentionally NOT set here so per-category overrides
# remain possible.
LANG=en_US.UTF-8
