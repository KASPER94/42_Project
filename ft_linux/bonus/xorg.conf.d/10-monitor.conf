# /etc/X11/xorg.conf.d/10-monitor.conf
# =============================================================================
# ft_linux bonus — modesetting Device + Monitor for a VirtualBox guest WITHOUT
# Guest Additions. Installed by bonus/20-xorg/10-xorg-server.sh.
#
# The in-kernel vboxvideo DRM driver exposes a KMS device; the Xorg server's
# built-in 'modesetting' driver consumes it. Without Guest Additions there is
# no dynamic resize, so we pin a sensible fixed resolution (1280x800). Change
# the Modes line (and the matching @RESOLUTION@ in xinitrc) for a bigger guest.
# =============================================================================

Section "Device"
    Identifier  "VBox-modesetting"
    Driver      "modesetting"
    # No BusID needed: modesetting binds the first KMS-capable DRM device.
EndSection

Section "Monitor"
    Identifier  "VBox-Monitor"
    # A generic, VBox-friendly mode. Most VBox displays accept these ranges.
    HorizSync    28.0 - 80.0
    VertRefresh  43.0 - 75.0
    # The preferred fixed mode for a no-Guest-Additions setup.
    Modeline "1280x800"  83.50  1280 1352 1480 1680  800 803 809 831 -hsync +vsync
    Option      "PreferredMode" "1280x800"
EndSection

Section "Screen"
    Identifier  "VBox-Screen"
    Device      "VBox-modesetting"
    Monitor     "VBox-Monitor"
    DefaultDepth 24
    SubSection "Display"
        Depth   24
        Modes   "1280x800" "1024x768" "800x600"
    EndSubSection
EndSection
